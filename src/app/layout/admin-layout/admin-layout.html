<div class="layout">
  <aside class="sidebar">
    <div class="sidebar-top">
      <div class="logo">
        <h2>Gestionale Admin</h2>
        <p>{{ utenteCorrenteService.utenteCorrente()?.nome }}</p>
      </div>

      <nav class="menu">
        <a
          routerLink="/admin"
          routerLinkActive="active"
          [routerLinkActiveOptions]="{ exact: true }"
        >
          Dashboard
        </a>

        <a routerLink="/admin/registra-dipendente" routerLinkActive="active">
          Registra dipendente
        </a>

        <a routerLink="/admin/lista-dipendenti" routerLinkActive="active"> Lista dipendenti </a>

        <a routerLink="/admin/imposta-presenze" routerLinkActive="active"> Imposta presenze </a>

        <a routerLink="/admin/storico-presenze" routerLinkActive="active"> Storico presenze </a>

        <button class="logout-btn" (click)="logout()">Logout</button>
      </nav>
    </div>
  </aside>

  <main class="content">
    <router-outlet></router-outlet>
  </main>
</div>
